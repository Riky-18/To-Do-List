<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloom</title>
<meta name="theme-color" content="#f4f1e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bloom">
<link rel="manifest" href="./manifest.webmanifest?v=20260427-round">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png?v=20260427-round">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png?v=20260427-round">
<link rel="shortcut icon" href="./icons/favicon-32.png?v=20260427-round">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png?v=20260427-round">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f1e8;--bg2:#ece7da;--bg3:#e2dccf;
  --card:#fdfaf3;--card2:#f6f2e8;
  --text:#2a2115;--text2:#6a5a3c;--text3:#9b886a;
  --accent:#4a7c59;--accent2:#6aab7e;--accent3:#a8d8b8;
  --gold:#c9903a;--rose:#be5f59;--rose2:#e08580;--sky:#5a8ea6;
  --border:rgba(70,56,34,.1);--border2:rgba(70,56,34,.2);
  --sh:0 2px 12px rgba(42,33,21,.08);--sh2:0 6px 28px rgba(42,33,21,.14);
  --r:16px;--r2:12px;--r3:8px;
  --spring:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"] {
  --bg:#181812;--bg2:#201f18;--bg3:#28271e;
  --card:#232218;--card2:#2b2a1f;
  --text:#ece7da;--text2:#c2b492;--text3:#887860;
  --accent:#68a87a;--accent2:#8dca9e;--accent3:#afd8be;
  --gold:#e6b368;--rose:#de8480;--rose2:#ecb0ac;--sky:#7ab2ca;
  --border:rgba(236,231,218,.09);--border2:rgba(236,231,218,.18);
  --sh:0 2px 12px rgba(0,0,0,.28);--sh2:0 6px 28px rgba(0,0,0,.42);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .35s,color .35s;overscroll-behavior:none;position:relative;}
body::before{content:'';position:fixed;inset:-18%;pointer-events:none;z-index:0;background:
  radial-gradient(circle at 14% 18%,rgba(106,171,126,.11),transparent 34%),
  radial-gradient(circle at 84% 14%,rgba(201,144,58,.08),transparent 28%),
  radial-gradient(circle at 52% 100%,rgba(90,142,166,.08),transparent 30%);
  animation:ambientShift 18s ease-in-out infinite alternate;}
body.ready .topbar{animation:riseIn .55s var(--spring) both;}
body.ready .dsw{animation:riseIn .6s .06s var(--spring) both;}
body.ready .inner{animation:riseIn .65s .12s var(--spring) both;}
body.ready .bnav{animation:riseIn .7s .18s var(--spring) both;}
@keyframes ambientShift{
  0%{transform:translate3d(-2%,0,0) scale(1);}
  50%{transform:translate3d(2%,-1.5%,0) scale(1.04);}
  100%{transform:translate3d(-1%,2%,0) scale(1.02);}
}
@keyframes riseIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:none;}
}

/* topbar */
.topbar{flex:0 0 auto;padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--border);position:relative;z-index:10;box-shadow:var(--sh);}
.tl{display:flex;align-items:center;gap:10px;}
.app-icon{width:50px;height:50px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:iconFloat 4.8s ease-in-out infinite;font-size:0;color:transparent;box-shadow:0 4px 14px rgba(74,124,89,.18);}
.app-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.app-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.4px;line-height:1;}
.app-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
.tr{display:flex;gap:8px;}
.tr #btnBouquet{order:1;}
.tr #btnTheme{order:2;}
.tr .userbtn{order:3;}
.tbb{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s;color:var(--text);touch-action:manipulation;}
.tbb:active{transform:scale(.9);background:var(--bg3);}
.tbb:disabled{opacity:.65;cursor:default;}
.tbb:disabled:active{transform:none;background:var(--bg2);}
.userbtn{position:relative;overflow:hidden;padding:0;}
.userbtn::after{content:'';position:absolute;right:3px;bottom:3px;width:7px;height:7px;border-radius:50%;background:var(--text3);border:1.5px solid var(--card);opacity:.75;transition:all .2s;}
.userbtn.signed::after{background:var(--accent2);opacity:1;}
.uimg{width:100%;height:100%;object-fit:cover;display:block;}
.uinitial{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:13px;font-weight:700;letter-spacing:.2px;color:var(--text2);background:linear-gradient(135deg,rgba(255,255,255,.3),rgba(106,171,126,.2));}
.userbtn.signed .uinitial{display:none;}
@keyframes iconFloat{
  0%,100%{transform:translateY(0);box-shadow:0 2px 8px rgba(74,124,89,.28);}
  50%{transform:translateY(-2px);box-shadow:0 6px 16px rgba(74,124,89,.22);}
}

/* date strip */
.dsw{flex:0 0 auto;background:var(--card);border-bottom:1px solid var(--border);padding:10px 0 12px;position:relative;z-index:9;}
.dsh{display:flex;align-items:center;justify-content:space-between;padding:0 18px 8px;}
.dsm{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text);}
.dsnav{display:flex;gap:4px;}
.dsbtn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;}
.dsbtn:active{background:var(--accent);color:#fff;border-color:var(--accent);}
.ds{display:flex;gap:6px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 18px;-ms-overflow-style:none;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.ds::-webkit-scrollbar{display:none;}

/* date chip */
.chip{flex:0 0 52px;height:64px;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:1.5px solid transparent;background:var(--bg2);scroll-snap-align:start;transition:all .2s var(--spring);position:relative;}
.chip:active{transform:scale(.92);}
.cdow{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
.cnum{font-size:20px;font-weight:500;color:var(--text2);line-height:1;}
.cdot{width:5px;height:5px;border-radius:50%;background:transparent;margin-top:1px;}
.chip.today{background:var(--accent);border-color:var(--accent);box-shadow:0 3px 10px rgba(74,124,89,.3);}
.chip.today .cdow,.chip.today .cnum{color:#fff;}
.chip.today .cdot{background:rgba(255,255,255,.55);}
.chip.sel:not(.today){background:var(--card2);border-color:var(--accent2);}
.chip.sel:not(.today) .cnum{color:var(--accent);font-weight:600;}
.chip.sel:not(.today) .cdot{background:var(--accent2);}
.chip.today::after,.chip.sel:not(.today)::after{content:'';position:absolute;inset:3px;border-radius:calc(var(--r2) - 3px);border:1px solid rgba(255,255,255,.24);animation:chipPulse 2.8s ease-out infinite;pointer-events:none;}
.chip.has-t .cdot{background:var(--gold);}
.chip.all-done .cdot{background:var(--accent2);}
.chip.today.has-t .cdot{background:rgba(255,255,255,.65);}
.chip.today.all-done .cdot{background:rgba(255,255,255,.9);}
.chip.future{opacity:.5;}
.chip.pastbad .cnum{color:var(--rose2);}
@keyframes chipPulse{
  0%,100%{opacity:.3;transform:scale(1);}
  55%{opacity:.7;transform:scale(.96);}
}

/* body */
.bscroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 100px;scrollbar-width:none;position:relative;touch-action:pan-y;}
.bscroll::-webkit-scrollbar{display:none;}
.pull-refresh{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 110px);transform:translateX(-50%);z-index:26;display:flex;justify-content:center;pointer-events:none;}
.pull-pill{min-width:164px;max-width:calc(100vw - 36px);padding:9px 14px;border-radius:999px;background:rgba(253,250,243,.96);backdrop-filter:blur(8px);border:1px solid var(--border2);box-shadow:var(--sh);font-size:12px;font-weight:500;color:var(--text2);text-align:center;transform:translateY(-22px) scale(.96);opacity:0;transition:transform .18s ease,opacity .18s ease,background .18s ease,color .18s ease,border-color .18s ease;}
.pull-pill.show{opacity:1;}
.pull-pill.ready,.pull-pill.loading{background:var(--accent);border-color:var(--accent);color:#fff;}
.inner{position:relative;z-index:1;}
@media (min-width: 769px){
  .pull-refresh{display:none;}
}

/* stats */
.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.spill{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;}
.spill-ico{font-size:20px;line-height:1;}
.spill-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--accent);line-height:1;}
.spill-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:1px;}
.spill.stk .spill-num{color:var(--gold);}
.spill::after,.addcard::after,.qcard::after{content:'';position:absolute;top:0;bottom:0;left:-42%;width:38%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);transform:skewX(-18deg);animation:cardSheen 10.5s linear infinite;pointer-events:none;}
.spill-num.pop{animation:metricPop .45s var(--spring);}
@keyframes cardSheen{
  0%,74%{transform:translateX(0) skewX(-18deg);opacity:0;}
  82%{opacity:.4;}
  100%{transform:translateX(410%) skewX(-18deg);opacity:0;}
}
@keyframes metricPop{
  0%{transform:translateY(0) scale(1);}
  45%{transform:translateY(-2px) scale(1.08);}
  100%{transform:none;}
}

/* day heading */
.dhead{margin-bottom:14px;}
.dtitle{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.3px;line-height:1.2;}
.dsub{font-size:12px;color:var(--text3);margin-top:3px;}
.dbadge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:5px;}
.b-today{background:rgba(74,124,89,.13);color:var(--accent);}
.b-past{background:rgba(190,95,89,.11);color:var(--rose);}
.b-future{background:rgba(90,142,166,.11);color:var(--sky);}

/* add card */
.addcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px;position:relative;overflow:hidden;}
.addrow{display:flex;gap:8px;align-items:center;}
.tinput{flex:1;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--r3);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:all .2s;}
.tinput:focus{border-color:var(--accent);background:var(--bg);box-shadow:0 0 0 3px rgba(74,124,89,.1);}
.tinput::placeholder{color:var(--text3);}
.btnadd{width:42px;height:42px;min-width:42px;border-radius:var(--r3);background:var(--accent);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(74,124,89,.28);transition:all .2s var(--spring);line-height:1;animation:buttonBreath 3.6s ease-in-out infinite;}
.btnadd:active{transform:scale(.88);}
.rrow{display:flex;align-items:center;gap:8px;margin-top:10px;}
.rlbl{font-size:12px;color:var(--text3);}
.rsel{flex:1;padding:7px 10px;border-radius:var(--r3);background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;}
.rsel:focus{border-color:var(--accent);}

/* locked */
.locked{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;text-align:center;margin-bottom:12px;font-size:13px;color:var(--text3);}
.locked-ico{font-size:28px;margin-bottom:6px;}

/* task list */
.tlist{list-style:none;display:flex;flex-direction:column;gap:8px;}
.titem{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:13px;box-shadow:var(--sh);transition:all .28s;animation:tIn .32s var(--spring) both;}
@keyframes tIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.titem:active{transform:scale(.99);}
.titem.done{opacity:.62;}
.titem.done .ttxt{text-decoration:line-through;color:var(--text3);}
.fbtn{width:30px;height:30px;min-width:30px;border-radius:50%;border:2px solid var(--border2);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .25s var(--spring);-webkit-user-select:none;user-select:none;}
.fbtn:active:not(.ro){transform:scale(1.2);}
.fbtn.chk{background:var(--accent);border-color:var(--accent);animation:bloom .45s var(--spring);}
.fbtn.chk::after{content:'✓';color:#fff;font-size:13px;font-weight:500;}
@keyframes bloom{0%{transform:scale(1);}40%{transform:scale(1.4);box-shadow:0 0 0 8px rgba(74,124,89,.15);}70%{transform:scale(.92);}100%{transform:scale(1);}}
.fbtn.ro{cursor:default;}
.ttxt{flex:1;font-size:14px;color:var(--text);line-height:1.4;word-break:break-word;}
.ttag{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(106,171,126,.15);color:var(--accent2);white-space:nowrap;flex-shrink:0;}
.ttag.rec{background:rgba(201,144,58,.15);color:var(--gold);}
.bdel{width:26px;height:26px;min-width:26px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.bdel:active{background:rgba(190,95,89,.12);color:var(--rose);}

/* empty */
.empty{padding:32px 16px;text-align:center;}
.empty-ico{font-size:40px;margin-bottom:8px;}
.empty-txt{font-size:13px;color:var(--text3);line-height:1.6;}

/* progress */
.prow{margin-top:14px;}
.phead{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:5px;}
.ptrack{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .55s cubic-bezier(.34,1.2,.64,1);position:relative;overflow:hidden;transform-origin:left center;}
.pfill::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.18) 38%,rgba(255,255,255,.42) 50%,rgba(255,255,255,.18) 62%,transparent 100%);animation:progressSweep 2.8s linear infinite;}
.pfill.pulse{animation:progressPulse .5s ease;}
@keyframes progressSweep{
  from{transform:translateX(-120%);}
  to{transform:translateX(120%);}
}
@keyframes progressPulse{
  0%{transform:scaleY(1);}
  50%{transform:scaleY(1.35);}
  100%{transform:scaleY(1);}
}

/* quote */
.qcard{margin-top:14px;background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--accent3);border-radius:var(--r2);padding:12px 14px;font-size:12px;color:var(--text3);font-style:italic;line-height:1.6;text-align:center;position:relative;overflow:hidden;animation:quoteFloat 7s ease-in-out infinite;}
.qcard.qswap{animation:quoteSwap .45s ease, quoteFloat 7s .45s ease-in-out infinite;}
@keyframes quoteFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-2px);}
}
@keyframes quoteSwap{
  0%{opacity:.35;transform:translateY(6px);}
  100%{opacity:1;transform:none;}
}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--card);border-top:1px solid var(--border);padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:flex;justify-content:center;box-shadow:0 -2px 16px rgba(42,33,21,.09);}
.bnbtn{padding:12px 28px;border-radius:var(--r2);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;box-shadow:0 3px 12px rgba(74,124,89,.3);transition:all .2s;display:flex;align-items:center;gap:8px;animation:buttonBreath 4.4s ease-in-out infinite;position:relative;overflow:hidden;}
.bnbtn:active{transform:scale(.95);}
@keyframes buttonBreath{
  0%,100%{transform:translateY(0);box-shadow:0 3px 12px rgba(74,124,89,.3);}
  50%{transform:translateY(-1px);box-shadow:0 7px 18px rgba(74,124,89,.22);}
}

/* modal */
.moverlay{position:fixed;inset:0;z-index:50;background:rgba(24,24,18,.65);backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center;animation:fbg .25s ease;}
@keyframes fbg{from{opacity:0;}to{opacity:1;}}
.msheet{background:var(--card);border-radius:24px 24px 0 0;padding:28px 24px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:480px;text-align:center;animation:sup .38s var(--spring);box-shadow:0 -4px 32px rgba(0,0,0,.2);}
@keyframes sup{from{transform:translateY(120px);opacity:0;}to{transform:none;opacity:1;}}
.mb{font-size:64px;margin-bottom:12px;line-height:1;}
.mt{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text);margin-bottom:6px;}
.ms{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px;}
.mq{font-style:italic;font-size:12px;color:var(--text3);background:var(--bg2);border-radius:var(--r3);padding:10px 14px;border-left:3px solid var(--accent3);text-align:left;margin-bottom:18px;}
.mc{width:100%;padding:13px;border-radius:var(--r2);background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;box-shadow:0 3px 12px rgba(74,124,89,.28);transition:all .2s;}
.mc:active{transform:scale(.97);}

/* particles */
.bp{position:fixed;pointer-events:none;z-index:99;font-size:16px;animation:bpf 1.1s ease forwards;}
@keyframes bpf{0%{opacity:1;transform:scale(0) translateY(0);}35%{transform:scale(1.5) translateY(-12px);}100%{opacity:0;transform:scale(.7) translateY(-90px);}}
.pp{position:fixed;pointer-events:none;z-index:98;animation:ppf linear forwards;}
@keyframes ppf{from{opacity:1;transform:translateY(-20px) rotate(0);}to{opacity:0;transform:translateY(105vh) rotate(720deg);}}

/* toast */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 18px;font-size:13px;color:var(--text2);box-shadow:var(--sh2);z-index:100;white-space:nowrap;animation:tin .3s var(--spring),tout .3s ease 2.2s forwards;pointer-events:none;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(8px);}}

/* bg leaves */
.bgl{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bgleaf{position:absolute;opacity:.055;animation:sway 9s ease-in-out infinite;}
[data-theme="dark"] .bgleaf{opacity:.035;}
.bgleaf svg{fill:var(--accent);}
@keyframes sway{
  0%,100%{transform:rotate(0) translateY(0) scale(1);}
  50%{transform:rotate(5deg) translateY(-7px) scale(1.04);}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>
<body>
<div class="bgl" id="bgl"></div>

<div class="topbar">
  <div class="tl">
    <div class="app-icon"><img src="./assets/logo-title.png?v=20260427-round" alt="Bloom logo"></div>
    <div><div class="app-name">Bloom</div><div class="app-sub">Daily garden</div></div>
  </div>
  <div class="tr">
    <button class="tbb userbtn" id="btnAccount" title="Sign in with Google">
      <img class="uimg" id="uimg" alt="" hidden>
      <span class="uinitial" id="uinitial">G</span>
    </button>
    <button class="tbb" id="btnBouquet">💐</button>
    <button class="tbb" id="btnTheme">🌙</button>
  </div>
</div>

<div class="dsw">
  <div class="dsh">
    <div class="dsm" id="dsm"></div>
    <div class="dsnav">
      <button class="dsbtn" id="dsPrev">‹</button>

<script type="module">

const CLOUD_COLLECTION='bloomUsers';
const QQ=['Every completed task is a flower that blooms.','Small steps every day grow into great gardens.','Nurture your goals like seeds — with patience.','The secret of getting ahead is getting started.','A day without growth is a day without bloom.','Let your tasks root deeply, your peace grow tall.','You are doing better than yesterday\'s flower knew.','Even the tallest tree started as a single seed.','One task at a time. One petal at a time.','Growth is quiet. Keep going.'];

function p2(n){return String(n).padStart(2,'0');}
function toDs(y,m,d){return`${y}-${p2(m+1)}-${p2(d)}`;}
function tdStr(){const n=new Date();return toDs(n.getFullYear(),n.getMonth(),n.getDate());}
function parseD(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d);}
function isPast(ds){return ds<tdStr();}
function isFuture(ds){return ds>tdStr();}
function isToday(ds){return ds===tdStr();}
function replayClass(el,cn){if(!el)return;el.classList.remove(cn);void el.offsetWidth;el.classList.add(cn);}

function sanitizeTask(task,index){
  const text=typeof task?.text==='string'?task.text.trim().slice(0,120):'';
  if(!text)return null;
  const id=Number.isFinite(Number(task.id))?Number(task.id):Date.now()+index;
  return{id,text,done:!!task.done,rec:!!task.rec};
}

function sanitizeDays(days){
  const clean={};
  if(!days||typeof days!=='object')return clean;
  Object.entries(days).forEach(([ds,tasks])=>{
    if(!/^\d{4}-\d{2}-\d{2}$/.test(ds)||!Array.isArray(tasks))return;
    clean[ds]=tasks.map(sanitizeTask).filter(Boolean);
  });
  return clean;
}

function defaultState(theme='light'){
  return{days:{},streak:0,streakDate:'',theme:theme==='dark'?'dark':'light'};
}

function sanitizeState(raw){
  const src=raw&&typeof raw==='object'?raw:{};
  return{
    days:sanitizeDays(src.days),
    streak:Number.isFinite(Number(src.streak))?Math.max(0,parseInt(src.streak,10)||0):0,
    streakDate:typeof src.streakDate==='string'?src.streakDate:'',
    theme:src.theme==='dark'||src.theme==='light'?src.theme:'light'
  };
}

function clearLegacyLocalState(){
  try{
    ['blm3-state','blm3','blm3-s','blm3-sd','blm3-th'].forEach(key=>localStorage.removeItem(key));
  }catch{}
}

const APP={
  state:defaultState(),
  sync:{ready:false,applying:false,firstSnapshot:true,docRef:null,timer:null,unsubscribe:null,activeUid:'',pushPromise:null},
  auth:{user:null,logoutTapCount:0,logoutTapTimer:null,lastTapAt:0,busy:false,ready:false},
  refresh:{loading:false,tracking:false,startY:0,distance:0,armed:false}
};

function queueCloudSave(){
  if(!APP.sync.ready||APP.sync.applying||!APP.sync.docRef)return;
  clearTimeout(APP.sync.timer);
  APP.sync.timer=setTimeout(pushCloudState,250);
}

async function pushCloudState(){
  if(!APP.sync.ready||APP.sync.applying||!APP.sync.docRef)return;
  if(APP.sync.pushPromise)return APP.sync.pushPromise;
  APP.sync.pushPromise=(async()=>{
    try{
      await setDoc(APP.sync.docRef,{state:APP.state,updatedAt:serverTimestamp()},{merge:true});
    }catch(err){
      console.error('Firebase save failed.',err);
    }finally{
      APP.sync.pushPromise=null;
    }
  })();
  try{
    await APP.sync.pushPromise;
  }catch{}
}

async function flushCloudSave(){
  clearTimeout(APP.sync.timer);
  APP.sync.timer=null;
  await pushCloudState();
}

function saveState(remote=true){
  if(remote)queueCloudSave();
}

function stopCloudSync(){
  clearTimeout(APP.sync.timer);
  if(APP.sync.unsubscribe)APP.sync.unsubscribe();
  APP.sync.unsubscribe=null;
  APP.sync.ready=false;
  APP.sync.docRef=null;
  APP.sync.firstSnapshot=true;
  APP.sync.activeUid='';
  APP.sync.pushPromise=null;
}

function profileLabel(user){
  if(!user)return'G';
  const source=(user.displayName||user.email||'G').trim();
  return source.charAt(0).toUpperCase()||'G';
}

function isSignedIntoAccount(user){
  return !!user;
}

function clearLogoutTapState(){
  APP.auth.logoutTapCount=0;
  APP.auth.lastTapAt=0;
  clearTimeout(APP.auth.logoutTapTimer);
  APP.auth.logoutTapTimer=null;
}

function setAccountBusy(busy){
  APP.auth.busy=busy;
  const btn=document.getElementById('btnAccount');
  if(btn)btn.disabled=busy;
}

function useRedirectAuthFlow(){
  return window.matchMedia('(pointer: coarse)').matches
    || window.matchMedia('(display-mode: standalone)').matches
    || navigator.standalone===true;
}

function renderAccountButton(user){
  const btn=document.getElementById('btnAccount');
  const img=document.getElementById('uimg');
  const txt=document.getElementById('uinitial');
  const signed=isSignedIntoAccount(user);
  const waiting=!APP.auth.ready&&!signed;
  const name=signed?(user.displayName||user.email||'Google account'):(waiting?'Checking account':'Google sign in');
  btn.classList.toggle('signed',signed);
  const label=signed
    ?`Signed in as ${name}. Triple tap to sign out.`
    :(waiting?'Checking Google sign-in...':'Sign in with Google to sync your tasks');
  btn.title=label;
  btn.setAttribute('aria-label',label);
  txt.textContent=waiting?'...':profileLabel(user);
  if(signed&&user.photoURL){
    img.src=user.photoURL;
    img.hidden=false;
    txt.style.display='none';
  } else {
    img.hidden=true;
    img.removeAttribute('src');
    txt.style.display='flex';
  }
  btn.disabled=APP.auth.busy;
}

async function initAuthSession(){
  setAccountBusy(true);
  try{
    await setPersistence(auth,browserLocalPersistence);
    const redirectResult=await getRedirectResult(auth);
    if(redirectResult?.user)APP.auth.user=redirectResult.user;
    else if(auth.currentUser)APP.auth.user=auth.currentUser;
    if(redirectResult?.user)toast('Tasks now sync with your Google account.');
  }catch(err){
    console.error('Auth initialization failed.',err);
  }finally{
    APP.auth.ready=true;
    setAccountBusy(false);
    renderAccountButton(APP.auth.user);
    renderStrip();
    renderDay();
  }
}

async function registerServiceWorker(){
  if(!('serviceWorker'in navigator))return;
  try{
    await navigator.serviceWorker.register('./service-worker.js');
  }catch(err){
    console.error('Service worker registration failed.',err);
  }
}

function gs(){return APP.state.days}
function ss(d){APP.state.days=d;saveState()}
function tf(ds){return APP.state.days[ds]||[]}
function stf(ds,t){APP.state.days[ds]=t;saveState()}
function gst(){return APP.state.streak}
function sst(v){APP.state.streak=v;saveState()}
function gsd(){return APP.state.streakDate}
function ssd(d){APP.state.streakDate=d;saveState()}

function addRecurMo(text,y,m){
  const s=gs();
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const ds=toDs(y,m,d);
    if(!s[ds])s[ds]=[];
    if(!s[ds].find(t=>t.text===text))
      s[ds].push({id:Date.now()+d,text,done:false,rec:true});
  }
  ss(s);
}

function addRecurWeekday(text,y,m,weekday){
  const s=gs();
  const days=new Date(y,m+1,0).getDate();
  for(let d=1;d<=days;d++){
    const date=new Date(y,m,d);
    if(date.getDay()!==weekday)continue;
    const ds=toDs(y,m,d);
    if(!s[ds])s[ds]=[];
    if(!s[ds].find(t=>t.text===text))
      s[ds].push({id:Date.now()+d+weekday*100,text,done:false,rec:true});
  }
  ss(s);
}

const now=new Date();
let SL={
  sel:tdStr(),
  sy:now.getFullYear(),sm:now.getMonth(),
  theme:APP.state.theme
};

function applyTh(t,persist=true){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('btnTheme').textContent=t==='dark'?'☀️':'🌙';
  APP.state.theme=t;
  if(persist)saveState();
}

function renderStrip(){
  const{sy,sm,sel}=SL;
  const store=gs();const td=tdStr();
  document.getElementById('dsm').textContent=`${MO[sm]} ${sy}`;
  const strip=document.getElementById('ds');
  strip.innerHTML='';
  const dim=new Date(sy,sm+1,0).getDate();
  for(let d=1;d<=dim;d++){
    const ds=toDs(sy,sm,d);
    const tasks=store[ds]||[];
    const dow=new Date(sy,sm,d).getDay();
    const c=document.createElement('div');
    let cl='chip';
    if(isToday(ds))cl+=' today';
    else if(ds===sel)cl+=' sel';
    if(isFuture(ds))cl+=' future';
    if(tasks.length){
      cl+=' has-t';
      if(tasks.every(t=>t.done))cl+=' all-done';
      else if(isPast(ds)&&tasks.some(t=>!t.done))cl+=' pastbad';
    }
    c.className=cl;
    c.innerHTML=`<div class="cdow">${DW[dow]}</div><div class="cnum">${d}</div><div class="cdot"></div>`;
    c.dataset.ds=ds;
    c.addEventListener('click',()=>selDate(ds));
    strip.appendChild(c);
  }
  setTimeout(()=>{
    const el=strip.querySelector(`[data-ds="${sel}"]`);
    if(el)el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },40);
}

function selDate(ds){SL.sel=ds;renderStrip();renderDay();}

function renderDay(){
  const ds=SL.sel;
  const tasks=tf(ds);
  const future=isFuture(ds);
  const past=isPast(ds);
  const signedIn=isSignedIntoAccount(APP.auth.user);
  const editable=signedIn&&!future;
  const d=parseD(ds);

  document.getElementById('dtitle').textContent=`${DN[d.getDay()]}, ${MO[d.getMonth()]} ${d.getDate()}`;
  document.getElementById('dsub2').textContent=String(d.getFullYear());
  const badge=document.getElementById('dbadge');
  badge.textContent=isToday(ds)?'Today':past?'Past':'Future';
  badge.className='dbadge '+(isToday(ds)?'b-today':past?'b-past':'b-future');

  const addArea=document.getElementById('addArea');
  if(!signedIn){
    addArea.innerHTML=`<div class="locked"><div class="locked-ico">☁</div>Sign in with Google to load your account tasks.<br>Your list will sync across all devices on the same account.</div>`;
  } else if(future){
    addArea.innerHTML=`<div class="locked"><div class="locked-ico">🔒</div>Future dates are read-only.<br>Add tasks to today or past days only.</div>`;
  } else {
    addArea.innerHTML=`
      <div class="addcard">
        <div class="addrow">
          <input class="tinput" id="tinput" placeholder="Plant a new task…" maxlength="120"/>
          <button class="btnadd" id="btnadd">+</button>
        </div>
        <div class="rrow">
          <span class="rlbl">Repeat:</span>
          <select class="rsel" id="rsel">
            <option value="none">This day only</option>
            <option value="month">All of this month</option>
            <option value="dow-0">All Sundays</option>
            <option value="dow-1">All Mondays</option>
            <option value="dow-2">All Tuesdays</option>
            <option value="dow-3">All Wednesdays</option>
            <option value="dow-4">All Thursdays</option>
            <option value="dow-5">All Fridays</option>
            <option value="dow-6">All Saturdays</option>
          </select>
        </div>
      </div>`;
    document.getElementById('btnadd').addEventListener('click',addTask);
    document.getElementById('tinput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  }

  const list=document.getElementById('tlist');
  list.innerHTML='';
  if(!tasks.length){
    if(!signedIn){
      list.innerHTML=`<div class="empty"><div class="empty-ico">Cloud</div><div class="empty-txt">Sign in to view and manage your cloud-synced tasks.</div></div>`;
    } else
    list.innerHTML=`<div class="empty"><div class="empty-ico">${future?'🔮':past?'📜':'🌱'}</div><div class="empty-txt">${future?'No tasks planned.<br>Come back to today to add tasks.':past?'No tasks were recorded for this day.':'No tasks yet.<br>Plant your first intention above!'}</div></div>`;
  } else {
    tasks.forEach(task=>{
      const li=document.createElement('li');
      li.className='titem'+(task.done?' done':'');
      const fb=document.createElement('div');
      fb.className='fbtn'+(task.done?' chk':'')+(editable?'':' ro');
      if(editable)fb.addEventListener('click',()=>toggleTask(ds,task.id,li,fb));
      const tt=document.createElement('div');
      tt.className='ttxt';tt.textContent=task.text;
      li.appendChild(fb);li.appendChild(tt);
      if(task.rec){const tg=document.createElement('span');tg.className='ttag rec';tg.textContent='↻';li.appendChild(tg);}
      if(editable){
        const del=document.createElement('button');
        del.className='bdel';del.textContent='×';del.title='Remove';
        del.addEventListener('click',()=>delTask(ds,task.id,li));
        li.appendChild(del);
      }
      list.appendChild(li);
    });
  }

  const done=tasks.filter(t=>t.done).length,total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prow').style.display=total?'block':'none';
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pfill').style.width=pct+'%';

  const tt=tf(tdStr()),td2=tt.filter(t=>t.done).length;
  document.getElementById('sTod').textContent=`${td2}/${tt.length}`;
  updStreak();
  replayClass(document.getElementById('sTod'),'pop');
  replayClass(document.getElementById('sStrk'),'pop');
  if(total)replayClass(document.getElementById('pfill'),'pulse');
}

function addTask(){
  if(!isSignedIntoAccount(APP.auth.user)){toast('Sign in with Google to save tasks to your account.');return;}
  const inp=document.getElementById('tinput');
  const text=inp.value.trim();
  if(!text)return;
  const rec=document.getElementById('rsel').value;
  const ds=SL.sel;
  const d=parseD(ds);
  if(rec==='month'){
    addRecurMo(text,d.getFullYear(),d.getMonth());
    toast('Task added to all days this month.');
  } else if(rec.startsWith('dow-')){
    const weekday=Number(rec.split('-')[1]);
    addRecurWeekday(text,d.getFullYear(),d.getMonth(),weekday);
    toast(`${DN[weekday]} tasks added across this month.`);
  } else {
    const tasks=tf(ds);tasks.push({id:Date.now(),text,done:false,rec:false});stf(ds,tasks);
  }
  inp.value='';renderStrip();renderDay();
}

function toggleTask(ds,id,li,fb){
  if(!isSignedIntoAccount(APP.auth.user)){toast('Sign in with Google to update tasks.');return;}
  const tasks=tf(ds);const task=tasks.find(t=>t.id===id);
  if(!task)return;
  task.done=!task.done;stf(ds,tasks);
  li.classList.toggle('done',task.done);
  fb.classList.toggle('chk',task.done);
  if(task.done){spawnBloom(fb);toast(BL[Math.floor(Math.random()*BL.length)]+' Task bloomed!');}
  renderStrip();renderDay();
  const all=tf(ds);
  if(all.length&&all.every(t=>t.done))setTimeout(()=>showBouquet(true,all.length,0),600);
}

function delTask(ds,id,li){
  if(!isSignedIntoAccount(APP.auth.user)){toast('Sign in with Google to delete tasks.');return;}
  li.style.transition='all .22s';li.style.opacity='0';li.style.transform='translateX(16px) scale(.95)';
  setTimeout(()=>{stf(ds,tf(ds).filter(t=>t.id!==id));renderStrip();renderDay();},200);
}

function spawnBloom(el){
  const r=el.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<7;i++){
    const p=document.createElement('div');p.className='bp';
    p.textContent=BL[Math.floor(Math.random()*BL.length)];
    p.style.cssText=`left:${cx+(Math.random()-.5)*60}px;top:${cy}px;animation-delay:${i*.07}s;animation-duration:${.85+Math.random()*.4}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
}

function showBouquet(allDone,done,pending){
  const root=document.getElementById('modalRoot');
  const bq=allDone?'💐🌸🌺🌼':'💐🥀';
  const title=allDone?'Garden Complete!':'Day\'s Harvest';
  const sub=allDone?`You bloomed all ${done} tasks! Your garden is radiant.`:`${done} bloomed 🌸 · ${pending} wilted 🥀 today.`;
  const q=QQ[Math.floor(Math.random()*QQ.length)];
  root.innerHTML=`<div class="moverlay" id="mov" onclick="if(event.target===this)clsM()"><div class="msheet"><div class="mb">${bq}</div><div class="mt">${title}</div><div class="ms">${sub}</div><div class="mq">"${q}"</div><button class="mc" onclick="clsM()">Close garden</button></div></div>`;
  if(allDone)petalShower();
}
function clsM(){document.getElementById('modalRoot').innerHTML='';}
window.clsM=clsM;

function petalShower(){
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const p=document.createElement('div');p.className='pp';
      p.textContent=BL[Math.floor(Math.random()*BL.length)];
      const dur=2+Math.random()*2;
      p.style.cssText=`left:${Math.random()*100}vw;top:-30px;font-size:${12+Math.random()*10}px;animation-duration:${dur}s;`;
      document.body.appendChild(p);setTimeout(()=>p.remove(),dur*1000+200);
    },i*130);
  }
}

function toast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function updStreak(){
  const td=tdStr();const tt=tf(td);
  if(tt.length&&tt.every(t=>t.done)){
    const last=gsd();
    if(last!==td){
      const yd=new Date();yd.setDate(yd.getDate()-1);
      const ydStr=toDs(yd.getFullYear(),yd.getMonth(),yd.getDate());
      sst(last===ydStr?gst()+1:1);ssd(td);
    }
  }
  document.getElementById('sStrk').textContent=gst();
}

function renderQuote(animate=true){
  const el=document.getElementById('qcard');
  el.textContent=`"${QQ[Math.floor(Math.random()*QQ.length)]}"`;
  if(animate)replayClass(el,'qswap');
}

function statesEqual(a,b){
  return JSON.stringify(a)===JSON.stringify(b);
}

function getPullUi(){
  return{
    pill:document.getElementById('pullRefreshPill')
  };
}

function resetPullRefreshIndicator(){
  APP.refresh.tracking=false;
  APP.refresh.distance=0;
  APP.refresh.armed=false;
  const{pill}=getPullUi();
  if(pill){
    pill.textContent='Pull to refresh';
    pill.classList.remove('show','ready','loading');
    pill.style.transform='translateY(-22px) scale(.96)';
    pill.style.opacity='0';
  }
}

function updatePullRefreshIndicator(distance){
  const{pill}=getPullUi();
  const eased=Math.min(92,distance);
  APP.refresh.distance=eased;
  APP.refresh.armed=eased>=58;
  if(pill){
    const pillY=Math.min(10,-22+eased*.45);
    pill.textContent=APP.refresh.armed?'Release to refresh':'Pull to refresh';
    pill.classList.add('show');
    pill.classList.toggle('ready',APP.refresh.armed);
    pill.classList.remove('loading');
    pill.style.transform=`translateY(${pillY}px) scale(${0.96+Math.min(eased,48)/700})`;
    pill.style.opacity=String(Math.min(1,Math.max(.14,eased/42)));
  }
}

async function refreshCloudState(source='manual'){
  if(APP.refresh.loading)return;
  const manual=source==='manual';
  if(!APP.sync.docRef){
    if(manual)toast('Sign in with Google to refresh shared tasks.');
    resetPullRefreshIndicator();
    return;
  }
  APP.refresh.loading=true;
  const{pill}=getPullUi();
  if(manual&&pill){
    pill.textContent='Refreshing...';
    pill.classList.add('show','loading');
    pill.classList.remove('ready');
    pill.style.transform='translateY(6px) scale(1)';
    pill.style.opacity='1';
  }
  try{
    const snap=await getDocFromServer(APP.sync.docRef);
    const payload=snap.exists()?snap.data():null;
    const remoteState=payload&&payload.state?sanitizeState(payload.state):null;
    if(remoteState){
      if(!statesEqual(remoteState,APP.state)){
        syncFromCloud(remoteState);
        if(manual)toast('Latest tasks loaded.');
      } else if(manual){
        toast('Your task list is already up to date.');
      }
    } else if(manual){
      toast('No synced tasks found for this account yet.');
    }
  }catch(err){
    console.error('Cloud refresh failed.',err);
    if(manual)toast(navigator.onLine?'Unable to refresh right now.':'You are offline right now.');
  }finally{
    APP.refresh.loading=false;
    if(manual)setTimeout(resetPullRefreshIndicator,140);
    else resetPullRefreshIndicator();
  }
}

function syncFromCloud(state){
  APP.sync.applying=true;
  APP.state=sanitizeState(state);
  SL.theme=APP.state.theme;
  applyTh(SL.theme,false);
  renderStrip();
  renderDay();
  APP.sync.applying=false;
}

function resetAccountState(theme=SL.theme){
  APP.state=defaultState(theme);
  renderStrip();
  renderDay();
}

function startCloudSync(user){
  stopCloudSync();
  APP.sync.docRef=doc(db,CLOUD_COLLECTION,user.uid);
  APP.sync.ready=true;
  APP.sync.activeUid=user.uid;
  APP.sync.unsubscribe=onSnapshot(APP.sync.docRef,snap=>{
    const payload=snap.exists()?snap.data():null;
    const remoteState=payload&&payload.state?sanitizeState(payload.state):null;
    if(APP.sync.firstSnapshot){
      APP.sync.firstSnapshot=false;
      if(remoteState){
        if(!statesEqual(remoteState,APP.state))syncFromCloud(remoteState);
      } else {
        queueCloudSave();
      }
      return;
    }
    if(remoteState&&!statesEqual(remoteState,APP.state))syncFromCloud(remoteState);
  },err=>{
    APP.sync.ready=false;
    console.error('Firebase sync failed.',err);
  });
}

async function signInWithGoogleAccount(){
  if(APP.auth.busy)return;
  setAccountBusy(true);
  try{
    if(useRedirectAuthFlow()){
      await signInWithRedirect(auth,googleProvider);
      return;
    }
    await signInWithPopup(auth,googleProvider);
    toast('Tasks now sync with your Google account.');
  }catch(err){
    if(err.code==='auth/popup-closed-by-user')return;
    if(err.code==='auth/cancelled-popup-request')return;
    if(err.code==='auth/credential-already-in-use'){
      try{
        if(useRedirectAuthFlow()){
          await signInWithRedirect(auth,googleProvider);
          return;
        }
        await signInWithPopup(auth,googleProvider);
        toast('Tasks now sync with your Google account.');
        return;
      }catch(innerErr){
        if(innerErr.code!=='auth/popup-closed-by-user')console.error('Google sign-in failed.',innerErr);
        return;
      }
    }
    console.error('Google sign-in failed.',err);
    toast('Google sign-in needs to be enabled in Firebase Auth.');
  }finally{
    setAccountBusy(false);
  }
}

function bindAuth(){
  onAuthStateChanged(auth,user=>{
    APP.auth.user=user;
    APP.auth.ready=true;
    setAccountBusy(false);
    clearLogoutTapState();
    renderAccountButton(user);
    if(user)startCloudSync(user);
    else{
      stopCloudSync();
      resetAccountState(SL.theme);
    }
    renderStrip();
    renderDay();
  });
}

async function handleAccountButtonTap(){
  if(APP.auth.busy)return;
  const user=APP.auth.user;
  if(!isSignedIntoAccount(user)){
    await signInWithGoogleAccount();
    return;
  }

  const now=Date.now();
  if(now-APP.auth.lastTapAt>1500)APP.auth.logoutTapCount=0;
  APP.auth.lastTapAt=now;
  APP.auth.logoutTapCount+=1;
  clearTimeout(APP.auth.logoutTapTimer);

  if(APP.auth.logoutTapCount>=3){
    clearLogoutTapState();
    setAccountBusy(true);
    try{
      await flushCloudSave();
      await signOut(auth);
      toast('Signed out. Sign in again to load your synced tasks.');
    }finally{
      setAccountBusy(false);
    }
    return;
  }

  const left=3-APP.auth.logoutTapCount;
  toast(`Triple tap profile to sign out. ${left} more tap${left===1?'':'s'}.`);
  APP.auth.logoutTapTimer=setTimeout(clearLogoutTapState,1500);
}

function initLeaves(){
  const c=document.getElementById('bgl');
  [{x:'4%',y:'8%',s:80,d:0},{x:'88%',y:'4%',s:60,d:2},{x:'78%',y:'78%',s:95,d:4},{x:'1%',y:'68%',s:70,d:1},{x:'92%',y:'48%',s:55,d:5}]
  .forEach(p=>{
    const div=document.createElement('div');div.className='bgleaf';
    div.style.cssText=`left:${p.x};top:${p.y};animation-delay:${p.d}s`;
    div.innerHTML=`<svg width="${p.s}" height="${p.s}" viewBox="0 0 100 100"><path d="M50 5C80 5 95 30 90 55S65 95 50 95 15 80 10 55 20 5 50 5Z"/></svg>`;
    c.appendChild(div);
  });
}

function bindPullToRefresh(){
  const scroller=document.getElementById('bscroll');
  if(!scroller)return;
  const isMobileGesture=()=>window.matchMedia('(pointer: coarse)').matches||window.innerWidth<=768;

  scroller.addEventListener('touchstart',event=>{
    if(event.touches.length!==1||APP.refresh.loading||!isMobileGesture())return;
    if(scroller.scrollTop>0){
      APP.refresh.tracking=false;
      return;
    }
    if(event.target.closest('input,textarea,select,button'))return;
    const bounds=scroller.getBoundingClientRect();
    const offsetFromTop=event.touches[0].clientY-bounds.top;
    if(offsetFromTop>84){
      APP.refresh.tracking=false;
      return;
    }
    APP.refresh.tracking=true;
    APP.refresh.startY=event.touches[0].clientY;
    APP.refresh.distance=0;
    APP.refresh.armed=false;
  },{passive:true});

  scroller.addEventListener('touchmove',event=>{
    if(!APP.refresh.tracking||event.touches.length!==1)return;
    if(scroller.scrollTop>0){
      resetPullRefreshIndicator();
      return;
    }
    const delta=event.touches[0].clientY-APP.refresh.startY;
    if(delta<=0){
      if(APP.refresh.distance>0)resetPullRefreshIndicator();
      return;
    }
    updatePullRefreshIndicator(delta*.55);
    if(delta>18)event.preventDefault();
  },{passive:false});

  const finishPull=()=>{
    if(!APP.refresh.tracking)return;
    const shouldRefresh=APP.refresh.armed;
    APP.refresh.tracking=false;
    if(shouldRefresh){
      refreshCloudState('manual');
      return;
    }
    resetPullRefreshIndicator();
  };

  scroller.addEventListener('touchend',finishPull,{passive:true});
  scroller.addEventListener('touchcancel',()=>{if(!APP.refresh.loading)resetPullRefreshIndicator();},{passive:true});
}

function bindLifecycleSync(){
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden'){
      flushCloudSave();
      return;
    }
    refreshCloudState('resume');
  });
  window.addEventListener('pagehide',()=>{flushCloudSave();});
  window.addEventListener('online',()=>{refreshCloudState('resume');});
}

document.addEventListener('DOMContentLoaded',()=>{
  clearLegacyLocalState();
  APP.auth.user=auth.currentUser;
  registerServiceWorker();
  applyTh(SL.theme);
  initLeaves();
  renderStrip();
  renderDay();
  renderQuote(false);
  renderAccountButton(auth.currentUser);
  requestAnimationFrame(()=>document.body.classList.add('ready'));
  bindPullToRefresh();
  bindLifecycleSync();
  bindAuth();
  initAuthSession();

  document.getElementById('btnTheme').addEventListener('click',()=>{
    SL.theme=SL.theme==='dark'?'light':'dark';applyTh(SL.theme);
  });
  document.getElementById('btnAccount').addEventListener('click',handleAccountButtonTap);
  document.getElementById('dsPrev').addEventListener('click',()=>{
    SL.sm--;if(SL.sm<0){SL.sm=11;SL.sy--;}renderStrip();
  });
  document.getElementById('dsNext').addEventListener('click',()=>{
    SL.sm++;if(SL.sm>11){SL.sm=0;SL.sy++;}renderStrip();
  });
  document.getElementById('dsToday').addEventListener('click',()=>{
    const n=new Date();SL.sy=n.getFullYear();SL.sm=n.getMonth();SL.sel=tdStr();renderStrip();renderDay();
  });
  const bh=()=>{
    const ds=tdStr();const tasks=tf(ds);
    if(!tasks.length){toast('🌱 Add some tasks first!');return;}
    const done=tasks.filter(t=>t.done).length;
    showBouquet(done===tasks.length,done,tasks.length-done);
  };
  document.getElementById('btnBouquet').addEventListener('click',bh);
  document.getElementById('btnSummary').addEventListener('click',bh);
  setInterval(()=>renderQuote(true),30000);
});
</script>
