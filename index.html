<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom — Nature To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2eb;
  --bg2: #ede9df;
  --bg3: #e4dfd2;
  --card: #fdfaf4;
  --card2: #f7f3ea;
  --text: #2c2416;
  --text2: #6b5c3e;
  --text3: #9c8a6e;
  --accent: #4a7c59;
  --accent2: #6aab7e;
  --accent3: #8fcca0;
  --gold: #c9913a;
  --gold2: #e8b86d;
  --rose: #c0605a;
  --rose2: #e08a85;
  --sky: #5b8fa8;
  --border: rgba(74,60,38,0.12);
  --border2: rgba(74,60,38,0.22);
  --shadow: 0 2px 16px rgba(44,36,22,0.08);
  --shadow2: 0 4px 32px rgba(44,36,22,0.13);
  --r: 14px;
  --r2: 10px;
  --transition: 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"] {
  --bg: #1a1a14;
  --bg2: #222218;
  --bg3: #2a2a1e;
  --card: #252520;
  --card2: #2e2e28;
  --text: #ede9df;
  --text2: #c4b898;
  --text3: #8a7c62;
  --accent: #6aab7e;
  --accent2: #8fcca0;
  --accent3: #b3dfc0;
  --gold: #e8b86d;
  --gold2: #f5d09a;
  --rose: #e08a85;
  --rose2: #edb4b0;
  --sky: #7db5ce;
  --border: rgba(237,233,223,0.1);
  --border2: rgba(237,233,223,0.2);
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
  --shadow2: 0 4px 32px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.4s, color 0.4s;
  overflow-x: hidden;
}

/* Animated bg leaves */
.bg-leaves {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-leaf {
  position: absolute; opacity: 0.06;
  animation: sway 8s ease-in-out infinite;
}
[data-theme="dark"] .bg-leaf { opacity: 0.04; }
.bg-leaf svg { fill: var(--accent); }
@keyframes sway {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  50% { transform: rotate(6deg) translateY(-8px); }
}

.app {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 24px 16px 80px;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; padding: 0 4px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 2px 8px rgba(74,124,89,0.3);
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 600; color: var(--text);
  letter-spacing: -0.5px;
}
.logo-tagline {
  font-size: 11px; color: var(--text3); letter-spacing: 0.5px;
  text-transform: uppercase; margin-top: -2px;
}
.header-actions { display: flex; gap: 8px; align-items: center; }

.btn-icon {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  transition: all 0.2s; box-shadow: var(--shadow);
  color: var(--text);
}
.btn-icon:hover { background: var(--bg3); transform: scale(1.05); }

/* Stats bar */
.stats-bar {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  text-align: center;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 600; color: var(--accent);
  line-height: 1;
}
.stat-label {
  font-size: 11px; color: var(--text3); margin-top: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.stat-streak .stat-val { color: var(--gold); }
.stat-quote .stat-val { font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-style: italic; }

/* Main layout */
.main-grid {
  display: grid; grid-template-columns: 280px 1fr;
  gap: 16px; align-items: start;
}
@media(max-width: 680px) {
  .main-grid { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .stat-streak { display: none; }
}

/* Calendar */
.calendar-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow);
  position: sticky; top: 20px;
}
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.cal-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 600; color: var(--text);
}
.cal-nav {
  display: flex; gap: 4px;
}
.cal-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text2); transition: all 0.2s;
}
.cal-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.cal-days-header {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; margin-bottom: 6px;
}
.cal-day-label {
  font-size: 10px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.3px; padding: 3px 0;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
}
.cal-day {
  aspect-ratio: 1; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 400; color: var(--text2);
  cursor: pointer; transition: all 0.15s; position: relative;
  border: 1px solid transparent;
}
.cal-day:hover { background: var(--bg3); }
.cal-day.today {
  background: var(--accent); color: white; font-weight: 500;
  box-shadow: 0 2px 6px rgba(74,124,89,0.3);
}
.cal-day.selected:not(.today) {
  background: var(--bg3); border-color: var(--accent2);
  color: var(--accent); font-weight: 500;
}
.cal-day.other-month { color: var(--text3); opacity: 0.4; }
.cal-day.has-tasks::after {
  content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--gold);
}
.cal-day.today.has-tasks::after { background: rgba(255,255,255,0.7); }
.cal-day.all-done::after { background: var(--accent3); }
.cal-day.today.all-done::after { background: rgba(255,255,255,0.9); }
.cal-day.past-incomplete { color: var(--rose2); }

/* Tasks panel */
.tasks-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.tasks-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--card2);
}
.tasks-date {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 600; color: var(--text);
  letter-spacing: -0.3px;
}
.tasks-date-sub {
  font-size: 12px; color: var(--text3); margin-top: 2px;
}
.tasks-date-badge {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 20px; margin-left: 8px;
  vertical-align: middle;
}
.badge-today { background: rgba(74,124,89,0.15); color: var(--accent); }
.badge-past { background: rgba(192,96,90,0.12); color: var(--rose); }
.badge-future { background: rgba(91,143,168,0.12); color: var(--sky); }
.badge-readonly { background: rgba(156,138,110,0.15); color: var(--text3); }

.task-add-area {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.task-input-row {
  display: flex; gap: 8px; align-items: center;
}
.task-input {
  flex: 1; padding: 10px 14px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r2); font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--text);
  outline: none; transition: all 0.2s;
}
.task-input:focus { border-color: var(--accent); background: var(--bg); box-shadow: 0 0 0 3px rgba(74,124,89,0.1); }
.task-input::placeholder { color: var(--text3); }
.task-input:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-add {
  padding: 10px 16px; border-radius: var(--r2);
  background: var(--accent); color: white;
  border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  transition: all 0.2s; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(74,124,89,0.25);
}
.btn-add:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,124,89,0.3); }
.btn-add:active { transform: translateY(0); }
.btn-add:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.recurring-row {
  display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap;
}
.recur-label { font-size: 12px; color: var(--text3); }
.recur-select {
  padding: 5px 10px; border-radius: 6px;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px;
  cursor: pointer; outline: none;
}
.recur-select:focus { border-color: var(--accent); }

.task-list {
  list-style: none; padding: 12px;
  max-height: 420px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}

.task-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 12px; border-radius: var(--r2);
  margin-bottom: 6px; transition: all 0.3s;
  background: var(--bg2); border: 1px solid var(--border);
  position: relative; overflow: hidden;
  animation: taskIn 0.35s var(--transition) forwards;
}
@keyframes taskIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.task-item:hover { border-color: var(--border2); background: var(--bg3); }
.task-item.completed {
  opacity: 0.7;
}
.task-item.completed .task-text {
  text-decoration: line-through; color: var(--text3);
}

/* Flower checkbox */
.flower-check {
  width: 28px; height: 28px; min-width: 28px;
  border-radius: 50%; border: 2px solid var(--border2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  background: var(--card); transition: all 0.3s;
  position: relative; overflow: hidden;
  font-size: 14px;
}
.flower-check:hover { border-color: var(--accent2); background: rgba(74,124,89,0.08); }
.flower-check.checked {
  border-color: var(--accent);
  background: var(--accent);
  animation: bloom 0.5s var(--transition);
}
.flower-check.checked::after {
  content: '✓'; color: white; font-size: 12px; font-weight: 500;
}
@keyframes bloom {
  0% { transform: scale(1); }
  40% { transform: scale(1.35); box-shadow: 0 0 0 8px rgba(74,124,89,0.15); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

.task-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.4; }
.task-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: rgba(106,171,126,0.15); color: var(--accent2);
  white-space: nowrap;
}
.task-tag.recurring { background: rgba(201,145,58,0.15); color: var(--gold); }

.btn-del {
  width: 26px; height: 26px; border-radius: 50%;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 14px; transition: all 0.2s;
  opacity: 0;
}
.task-item:hover .btn-del { opacity: 1; }
.btn-del:hover { background: rgba(192,96,90,0.12); color: var(--rose); }

.readonly-note {
  padding: 14px 20px; text-align: center;
  font-size: 13px; color: var(--text3); font-style: italic;
}
.empty-state {
  padding: 30px 20px; text-align: center; color: var(--text3);
}
.empty-icon { font-size: 36px; margin-bottom: 8px; }
.empty-text { font-size: 13px; line-height: 1.5; }

/* Progress */
.progress-bar-wrap {
  padding: 14px 20px 16px;
  border-top: 1px solid var(--border);
}
.progress-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--text3); margin-bottom: 6px;
}
.progress-track {
  height: 6px; border-radius: 3px;
  background: var(--bg3); overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
}

/* Bouquet modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(26,26,20,0.65); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 36px 40px;
  text-align: center;
  max-width: 380px; width: 90%;
  box-shadow: var(--shadow2);
  animation: modalIn 0.45s var(--transition);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.85) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-bouquet { font-size: 72px; margin-bottom: 16px; line-height: 1; }
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 600; color: var(--text);
  margin-bottom: 8px;
}
.modal-subtitle { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
.modal-quote {
  font-style: italic; font-size: 13px; color: var(--text3);
  padding: 12px 16px; background: var(--bg2);
  border-radius: var(--r2); border-left: 3px solid var(--accent2);
  margin-bottom: 20px; text-align: left;
}
.btn-close-modal {
  padding: 10px 28px; border-radius: var(--r2);
  background: var(--accent); color: white;
  border: none; cursor: pointer; font-size: 14px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s; box-shadow: 0 2px 8px rgba(74,124,89,0.25);
}
.btn-close-modal:hover { background: var(--accent2); transform: translateY(-1px); }

/* Floating blooms */
.bloom-particle {
  position: fixed; pointer-events: none; z-index: 99;
  font-size: 18px; animation: bloomFloat 1.2s ease forwards;
}
@keyframes bloomFloat {
  0% { opacity: 1; transform: scale(0) translateY(0); }
  30% { transform: scale(1.4) translateY(-10px); }
  100% { opacity: 0; transform: scale(0.8) translateY(-80px); }
}

/* Quotes ticker */
.quote-ticker {
  margin-top: 16px; padding: 12px 16px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: var(--r2); font-size: 12px;
  color: var(--text3); font-style: italic; text-align: center;
  border-left: 3px solid var(--accent3);
}

.mobile-date-picker {
  display: none;
  position: relative;
}
.mobile-date-trigger {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--r2);
  border: 1px solid var(--border2);
  background: linear-gradient(135deg, rgba(74,124,89,0.12), rgba(201,145,58,0.08));
  color: var(--text);
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.2px;
  box-shadow: var(--shadow);
  display: block;
}
.mobile-date-input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}

@media(max-width: 680px) {
  .calendar-card {
    position: static;
    padding: 12px;
  }
  .cal-header,
  .cal-days-header,
  .cal-grid,
  .quote-ticker {
    display: none;
  }
  .mobile-date-picker {
    display: block;
  }
  .tasks-header {
    padding: 16px 16px 12px;
  }
  .tasks-date {
    font-size: 18px;
  }
  .task-add-area,
  .progress-bar-wrap {
    padding-left: 16px;
    padding-right: 16px;
  }
}

/* Theme toggle */
.theme-toggle-wrap { display: flex; gap: 4px; align-items: center; }

/* Notification toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 10px 20px;
  font-size: 13px; color: var(--text2);
  box-shadow: var(--shadow2); z-index: 200;
  animation: toastIn 0.35s var(--transition), toastOut 0.3s ease 2.5s forwards;
  pointer-events: none;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes toastOut {
  to { opacity: 0; transform: translateX(-50%) translateY(10px); }
}

/* Petal shower */
.petal-shower .petal {
  position: fixed; pointer-events: none; z-index: 98;
  font-size: 16px; animation: petalFall linear forwards;
}
@keyframes petalFall {
  0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
}
</style>
</head>
<body>

<div class="bg-leaves" id="bgLeaves"></div>

<div class="app">
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <div>
        <div class="logo-text">Bloom</div>
        <div class="logo-tagline">Daily Nature Journal</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btnDayEnd" title="See today's bouquet">💐</button>
      <button class="btn-icon" id="btnTheme" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-val" id="statToday">0/0</div>
      <div class="stat-label">Today's tasks</div>
    </div>
    <div class="stat-card stat-streak">
      <div class="stat-val" id="statStreak">0🔥</div>
      <div class="stat-label">Day streak</div>
    </div>
    <div class="stat-card stat-quote">
      <div class="stat-val" id="statQuote" style="font-size:12px">Loading…</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="calendar-card">
      <div class="cal-header">
        <div class="cal-title" id="calMonthTitle"></div>
        <div class="cal-nav">
          <button class="cal-btn" id="calPrev">‹</button>
          <button class="cal-btn" id="calToday" title="Go to today" style="font-size:10px">⊙</button>
          <button class="cal-btn" id="calNext">›</button>
        </div>
      </div>
      <label class="mobile-date-picker" for="mobileDateInput">
        <span class="mobile-date-trigger" id="mobileDateTrigger"></span>
        <input class="mobile-date-input" id="mobileDateInput" type="date" aria-label="Choose date" />
      </label>
      <div class="cal-days-header">
        <div class="cal-day-label">Su</div>
        <div class="cal-day-label">Mo</div>
        <div class="cal-day-label">Tu</div>
        <div class="cal-day-label">We</div>
        <div class="cal-day-label">Th</div>
        <div class="cal-day-label">Fr</div>
        <div class="cal-day-label">Sa</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="quote-ticker" id="quoteTicker"></div>
    </div>

    <div class="tasks-panel">
      <div class="tasks-header">
        <div class="tasks-date" id="tasksDateTitle"></div>
        <div class="tasks-date-sub" id="tasksDateSub"></div>
      </div>
      <div class="task-add-area" id="taskAddArea">
        <div class="task-input-row">
          <input class="task-input" id="taskInput" placeholder="Plant a new task…" maxlength="120" />
          <button class="btn-add" id="btnAdd">+ Add</button>
        </div>
        <div class="recurring-row">
          <span class="recur-label">Repeat:</span>
          <select class="recur-select" id="recurSelect">
            <option value="none">This day only</option>
            <option value="month">All of this month</option>
          </select>
        </div>
      </div>
      <ul class="task-list" id="taskList"></ul>
      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>Daily bloom</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modalOverlay" style="display:none"></div>

<script>
const QUOTES = [
  "Every task completed is a flower that blooms.",
  "Small steps every day grow into great gardens.",
  "Nurture your goals like seeds — with patience.",
  "The secret of getting ahead is getting started.",
  "A day without growth is a day without bloom.",
  "Let your tasks root deeply and your peace grow tall.",
  "You're doing better than yesterday's flower knew.",
  "Even the tallest tree started as a single seed.",
  "One task at a time. One petal at a time.",
];

const BLOOM_EMOJIS = ['🌸', '🌺', '🌼', '🌻', '💐', '🌷', '🌹'];
const WILTED_EMOJIS = ['🥀'];

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// State
let state = {
  selectedDate: todayStr(),
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  theme: localStorage.getItem('bloom-theme') || 'light',
};

// Storage
function getStore() {
  try { return JSON.parse(localStorage.getItem('bloom-tasks') || '{}'); } catch { return {}; }
}
function saveStore(data) { localStorage.setItem('bloom-tasks', JSON.stringify(data)); }
function getStreak() { return parseInt(localStorage.getItem('bloom-streak') || '0'); }
function saveStreak(v) { localStorage.setItem('bloom-streak', v); }
function getLastStreakDate() { return localStorage.getItem('bloom-streak-date') || ''; }
function saveLastStreakDate(d) { localStorage.setItem('bloom-streak-date', d); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function isToday(ds) { return ds === todayStr(); }
function isPast(ds) { return ds < todayStr(); }
function isFuture(ds) { return ds > todayStr(); }
function parseDate(ds) { return new Date(ds + 'T00:00:00'); }
function formatMobileDate(ds) {
  const d = parseDate(ds);
  return `${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function syncMobileDateControl() {
  const input = document.getElementById('mobileDateInput');
  const trigger = document.getElementById('mobileDateTrigger');
  if (input) input.value = state.selectedDate;
  if (trigger) trigger.textContent = formatMobileDate(state.selectedDate);
}

function tasksForDate(ds) {
  const store = getStore();
  return store[ds] || [];
}
function setTasksForDate(ds, tasks) {
  const store = getStore();
  store[ds] = tasks;
  saveStore(store);
}

// Recurring
function addRecurringMonth(text, year, month) {
  const store = getStore();
  const days = new Date(year, month+1, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const ds = dateStr(year, month, d);
    if (!store[ds]) store[ds] = [];
    // Avoid duplicates
    if (!store[ds].find(t => t.text === text)) {
      store[ds].push({ id: Date.now() + d, text, done: false, recurring: true });
    }
  }
  saveStore(store);
}

// Theme
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btnTheme').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('bloom-theme', t);
}

// Calendar rendering
function renderCalendar() {
  const { calYear, calMonth, selectedDate } = state;
  const today = todayStr();
  const store = getStore();

  document.getElementById('calMonthTitle').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  // prev month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = prevDays - i;
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }

  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = dateStr(calYear, calMonth, d);
    const tasks = store[ds] || [];
    const el = document.createElement('div');
    let cls = 'cal-day';
    if (ds === today) cls += ' today';
    if (ds === selectedDate && ds !== today) cls += ' selected';
    if (tasks.length > 0) {
      cls += ' has-tasks';
      if (tasks.every(t => t.done)) cls += ' all-done';
      else if (isPast(ds) && tasks.some(t => !t.done)) cls += ' past-incomplete';
    }
    el.className = cls;
    el.textContent = d;
    el.dataset.ds = ds;
    el.addEventListener('click', () => selectDate(ds));
    grid.appendChild(el);
  }

  // next month fill
  const total = firstDay + daysInMonth;
  const remaining = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

function selectDate(ds) {
  const selected = parseDate(ds);
  state.selectedDate = ds;
  state.calYear = selected.getFullYear();
  state.calMonth = selected.getMonth();
  renderCalendar();
  renderTasks();
}

// Tasks rendering
function renderTasks() {
  const ds = state.selectedDate;
  const tasks = tasksForDate(ds);
  const today = todayStr();
  const readOnly = future;
  const past = isPast(ds);
  const future = isFuture(ds);
  const d = parseDate(ds);

  syncMobileDateControl();

  // Date title
  document.getElementById('tasksDateTitle').innerHTML =
    `${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}
    <span class="tasks-date-badge ${isToday(ds) ? 'badge-today' : past ? 'badge-past' : 'badge-future'}">${isToday(ds) ? 'Today' : past ? 'Past' : 'Future'}</span>`;
  document.getElementById('tasksDateSub').textContent = readOnly
    ? 'Read-only — future day'
    : (past ? 'You can edit this past day' : 'Your garden for today');

  // Input area
  const addArea = document.getElementById('taskAddArea');
  const input = document.getElementById('taskInput');
  const btnAdd = document.getElementById('btnAdd');
  if (readOnly) {
    input.disabled = true; btnAdd.disabled = true;
    addArea.style.opacity = '0.5';
  } else {
    input.disabled = false; btnAdd.disabled = false;
    addArea.style.opacity = '1';
  }

  // List
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-text">${readOnly ? 'Future days cannot be edited yet.' : past ? 'No tasks were saved for this day yet.' : 'No tasks yet.<br>Plant your first intention above!'}</div></div>`;
  } else {
    tasks.forEach((task, i) => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' completed' : '');
      li.dataset.id = task.id;

      const check = document.createElement('div');
      check.className = 'flower-check' + (task.done ? ' checked' : '');
      if (!readOnly) {
        check.addEventListener('click', () => toggleTask(ds, task.id, li, check));
      } else {
        check.style.cursor = 'default';
      }

      const text = document.createElement('div');
      text.className = 'task-text';
      text.textContent = task.text;

      li.appendChild(check);
      li.appendChild(text);

      if (task.recurring) {
        const tag = document.createElement('span');
        tag.className = 'task-tag recurring'; tag.textContent = '↻ month';
        li.appendChild(tag);
      }

      if (!readOnly) {
        const del = document.createElement('button');
        del.className = 'btn-del'; del.title = 'Remove task'; del.textContent = '×';
        del.addEventListener('click', () => deleteTask(ds, task.id, li));
        li.appendChild(del);
      }

      list.appendChild(li);
    });
  }

  // Progress
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total === 0 ? 0 : Math.round((done/total)*100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Stats
  const todayTasks = tasksForDate(today);
  const todayDone = todayTasks.filter(t => t.done).length;
  document.getElementById('statToday').textContent = `${todayDone}/${todayTasks.length}`;

  updateStreak();
}

function toggleTask(ds, id, li, check) {
  const tasks = tasksForDate(ds);
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  setTasksForDate(ds, tasks);

  li.classList.toggle('completed', task.done);
  check.classList.toggle('checked', task.done);

  if (task.done) {
    spawnBloomParticles(check);
    showToast(BLOOM_EMOJIS[Math.floor(Math.random()*BLOOM_EMOJIS.length)] + ' Task bloomed!');
  }

  renderCalendar();
  renderTasks();

  // Check if all done
  const allTasks = tasksForDate(ds);
  if (allTasks.length > 0 && allTasks.every(t => t.done)) {
    setTimeout(() => showBouquet(true, allTasks.length, 0), 600);
  }
}

function deleteTask(ds, id, li) {
  li.style.animation = 'none';
  li.style.transition = 'all 0.25s';
  li.style.opacity = '0';
  li.style.transform = 'translateX(20px) scale(0.95)';
  setTimeout(() => {
    const tasks = tasksForDate(ds).filter(t => t.id !== id);
    setTasksForDate(ds, tasks);
    renderCalendar();
    renderTasks();
  }, 220);
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  const recur = document.getElementById('recurSelect').value;
  const ds = state.selectedDate;

  if (recur === 'month') {
    const d = new Date(ds + 'T00:00:00');
    addRecurringMonth(text, d.getFullYear(), d.getMonth());
    showToast('🌿 Added to all days this month!');
  } else {
    const tasks = tasksForDate(ds);
    tasks.push({ id: Date.now(), text, done: false, recurring: false });
    setTasksForDate(ds, tasks);
  }

  input.value = '';
  renderCalendar();
  renderTasks();
}

function spawnBloomParticles(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'bloom-particle';
    p.textContent = BLOOM_EMOJIS[Math.floor(Math.random()*BLOOM_EMOJIS.length)];
    p.style.cssText = `left:${cx + (Math.random()-0.5)*50}px;top:${cy}px;animation-delay:${i*0.08}s;animation-duration:${0.9+Math.random()*0.4}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function showBouquet(allDone, doneCount, pendingCount) {
  const overlay = document.getElementById('modalOverlay');
  overlay.style.display = 'flex';

  const bouquet = allDone ? '💐🌸🌺🌼' : '💐🥀';
  const title = allDone ? 'Garden Complete!' : 'Day\'s Harvest';
  const subtitle = allDone
    ? `You bloomed all ${doneCount} tasks today! Your garden is glowing.`
    : `${doneCount} tasks bloomed 🌸, ${pendingCount} wilted 🥀 today. Tomorrow is a new seed.`;
  const quote = QUOTES[Math.floor(Math.random()*QUOTES.length)];

  overlay.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-card">
        <div class="modal-bouquet">${bouquet}</div>
        <div class="modal-title">${title}</div>
        <div class="modal-subtitle">${subtitle}</div>
        <div class="modal-quote">"${quote}"</div>
        <button class="btn-close-modal" onclick="closeBouquet()">Close garden</button>
      </div>
    </div>`;

  if (allDone) petalShower();
}

function closeBouquet() {
  const overlay = document.getElementById('modalOverlay');
  overlay.innerHTML = '';
  overlay.style.display = 'none';
}

function petalShower() {
  for (let i = 0; i < 24; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = BLOOM_EMOJIS[Math.floor(Math.random()*BLOOM_EMOJIS.length)];
      p.style.cssText = `
        position: fixed; pointer-events: none; z-index: 98;
        left: ${Math.random()*100}vw; top: -30px;
        font-size: ${12 + Math.random()*10}px;
        animation: petalFall ${2 + Math.random()*2}s linear forwards;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 120);
  }
}

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function updateStreak() {
  const today = todayStr();
  const last = getLastStreakDate();
  const todayTasks = tasksForDate(today);
  if (todayTasks.length > 0 && todayTasks.every(t => t.done)) {
    if (last !== today) {
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      const yd = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
      const streak = last === yd ? getStreak() + 1 : 1;
      saveStreak(streak);
      saveLastStreakDate(today);
    }
  }
  document.getElementById('statStreak').textContent = getStreak() + '🔥';
}

function renderQuote() {
  const q = QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('statQuote').textContent = q;
  document.getElementById('quoteTicker').textContent = '"' + q + '"';
}

// Background leaves
function renderBgLeaves() {
  const container = document.getElementById('bgLeaves');
  const positions = [
    {x:'5%',y:'10%',size:80,delay:0},
    {x:'90%',y:'5%',size:60,delay:2},
    {x:'80%',y:'80%',size:100,delay:4},
    {x:'2%',y:'70%',size:70,delay:1},
    {x:'50%',y:'90%',size:90,delay:3},
    {x:'95%',y:'45%',size:55,delay:5},
  ];
  positions.forEach(p => {
    const div = document.createElement('div');
    div.className = 'bg-leaf';
    div.style.cssText = `left:${p.x};top:${p.y};animation-delay:${p.delay}s`;
    div.innerHTML = `<svg width="${p.size}" height="${p.size}" viewBox="0 0 100 100"><path d="M50 5 C80 5, 95 30, 90 55 C85 80, 65 95, 50 95 C35 95, 15 80, 10 55 C5 30, 20 5, 50 5Z"/></svg>`;
    container.appendChild(div);
  });
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(state.theme);
  renderBgLeaves();
  renderCalendar();
  renderTasks();
  renderQuote();

  document.getElementById('btnTheme').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme(state.theme);
  });

  document.getElementById('calPrev').addEventListener('click', () => {
    state.calMonth--;
    if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    state.calMonth++;
    if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
    renderCalendar();
  });
  document.getElementById('calToday').addEventListener('click', () => {
    selectDate(todayStr());
  });
  document.getElementById('mobileDateInput').addEventListener('change', e => {
    if (e.target.value) selectDate(e.target.value);
  });

  document.getElementById('btnAdd').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  document.getElementById('btnDayEnd').addEventListener('click', () => {
    const ds = todayStr();
    const tasks = tasksForDate(ds);
    if (tasks.length === 0) { showToast('🌱 Add some tasks first!'); return; }
    const done = tasks.filter(t => t.done).length;
    const pending = tasks.length - done;
    showBouquet(pending === 0, done, pending);
  });

  // Rotate quotes
  setInterval(renderQuote, 30000);
});
</script>
</body>
</html>
